<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">宋品豪 Song Pinhao — AI Product Builder</title>
  <desc id="desc">米白色网格背景上的个人作品集横幅，包含橙色几何图形与黑色圆形标志。</desc>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#171717" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="10" stdDeviation="0" flood-color="#171717" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="#F4F1E8"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <g font-family="Arial, 'Noto Sans SC', sans-serif" fill="#171717">
    <text x="56" y="58" font-size="14" font-weight="700" letter-spacing="3">SPH / PRODUCT LOG</text>
    <circle cx="62" cy="86" r="5" fill="#14A45A"/>
    <text x="76" y="91" font-size="12" font-weight="700" letter-spacing="2">BEIJING · AVAILABLE FOR COLLABORATION</text>

    <text x="54" y="180" font-size="68" font-weight="800" letter-spacing="-4">宋品豪</text>
    <text x="54" y="245" font-size="62" font-weight="800" letter-spacing="-3">SONG PINHAO</text>
    <rect x="54" y="270" width="552" height="38" fill="#D8FF3E" transform="rotate(-1 54 270)"/>
    <text x="68" y="296" font-size="17" font-weight="700" letter-spacing="3">AI PRODUCT BUILDER · AGENT SYSTEMS · INTERACTION</text>
    <text x="56" y="352" font-size="17" font-weight="600">把想法做成能被体验的产品。</text>
    <text x="56" y="382" font-size="13" fill="#65645F" letter-spacing="1">BUILD / TEST / SHIP — SELECTED WORK 01—06</text>
  </g>

  <g transform="translate(892 205)">
    <path d="M-151-90C-81-151 58-145 130-57c74 89 38 211-62 247-95 34-228-20-247-119-12-61-4-112 28-161Z" fill="#FF5B35"/>
    <ellipse rx="168" ry="74" fill="none" stroke="#171717" stroke-width="2" transform="rotate(24)"/>
    <ellipse rx="150" ry="92" fill="none" stroke="#171717" stroke-width="2" transform="rotate(-37)"/>
    <circle r="108" fill="#171717" stroke="#F4F1E8" stroke-width="3" filter="url(#shadow)"/>
    <circle r="91" fill="none" stroke="#F4F1E8" stroke-opacity=".42"/>
    <text x="0" y="-45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#F4F1E8" letter-spacing="2">BUILD / TEST / SHIP</text>
    <text x="0" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-size="74" font-weight="800" fill="#F4F1E8" letter-spacing="-5">SPH</text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#D8FF3E" letter-spacing="2">AI × INTERACTION</text>
    <circle cx="-158" cy="-2" r="8" fill="#D8FF3E" stroke="#171717" stroke-width="3"/>
    <circle cx="135" cy="-79" r="8" fill="#3157FF" stroke="#171717" stroke-width="3"/>
  </g>

  <text x="1139" y="385" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#171717" letter-spacing="2">PORTFOLIO / 2026 ↗</text>
</svg>
