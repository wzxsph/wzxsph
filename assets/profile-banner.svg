<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">宋品豪 Song Pinhao — AI Product Builder</title>
  <desc id="desc">A cream grid portfolio banner with bold bilingual type and an orange SPH mark.</desc>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#171717" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="10" stdDeviation="0" flood-color="#171717" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="#F4F1E8"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <g font-family="Arial, 'Noto Sans SC', sans-serif" fill="#171717">
    <circle cx="64" cy="54" r="7" fill="#14A45A"/>
    <text x="82" y="61" font-size="18" font-weight="700" letter-spacing="2">OPEN FOR PRODUCT COLLABORATION</text>

    <text x="54" y="170" font-size="76" font-weight="800" letter-spacing="-4">宋品豪</text>
    <text x="54" y="242" font-size="66" font-weight="800" letter-spacing="-3">SONG PINHAO</text>

    <rect x="54" y="270" width="562" height="48" fill="#D8FF3E" transform="rotate(-1 54 270)"/>
    <text x="70" y="302" font-size="20" font-weight="700" letter-spacing="2">AI PRODUCT BUILDER · AGENTS · INTERACTION</text>

    <text x="56" y="370" font-size="18" font-weight="700" letter-spacing="2">FEATURED WORK / 01—03</text>
  </g>

  <g transform="translate(892 205)">
    <path d="M-151-90C-81-151 58-145 130-57c74 89 38 211-62 247-95 34-228-20-247-119-12-61-4-112 28-161Z" fill="#FF5B35"/>
    <ellipse rx="168" ry="74" fill="none" stroke="#171717" stroke-width="2" transform="rotate(24)"/>
    <ellipse rx="150" ry="92" fill="none" stroke="#171717" stroke-width="2" transform="rotate(-37)"/>
    <circle r="108" fill="#171717" stroke="#F4F1E8" stroke-width="3" filter="url(#shadow)"/>
    <circle r="91" fill="none" stroke="#F4F1E8" stroke-opacity=".42"/>
    <text x="0" y="-45" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#F4F1E8" letter-spacing="2">BUILD / TEST / SHIP</text>
    <text x="0" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-size="74" font-weight="800" fill="#F4F1E8" letter-spacing="-5">SPH</text>
    <text x="0" y="61" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#D8FF3E" letter-spacing="2">AI × PRODUCT</text>
    <circle cx="-158" cy="-2" r="8" fill="#D8FF3E" stroke="#171717" stroke-width="3"/>
    <circle cx="135" cy="-79" r="8" fill="#3157FF" stroke="#171717" stroke-width="3"/>
  </g>

  <text x="1139" y="385" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#171717" letter-spacing="2">PORTFOLIO ↗</text>
</svg>
