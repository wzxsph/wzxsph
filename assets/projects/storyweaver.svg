<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">StoryWeaver — Claude Code plugin for long-form fiction</title>
  <desc id="desc">A cream and black product banner showing a structured story workflow from context to verified chapters.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#171717" stroke-opacity=".10" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="9" dy="11" stdDeviation="0" flood-color="#171717" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="1200" height="480" rx="28" fill="#F4F1E8"/>
  <rect width="1200" height="480" rx="28" fill="url(#grid)"/>
  <circle cx="1090" cy="66" r="154" fill="#3157FF"/>
  <path d="M984 0C1050 63 1097 159 1083 254C1069 349 1004 421 914 480H1200V0Z" fill="#FF5B35" fill-opacity=".94"/>

  <g font-family="Arial, 'Noto Sans SC', sans-serif" fill="#171717">
    <text x="62" y="68" font-size="17" font-weight="700" letter-spacing="3">CLAUDE CODE PLUGIN · V1.2.3</text>
    <text x="58" y="168" font-size="68" font-weight="800" letter-spacing="-3">StoryWeaver</text>
    <text x="62" y="215" font-size="28" font-weight="700">Long-form fiction, built as a system.</text>
    <rect x="60" y="250" width="475" height="48" fill="#D8FF3E" transform="rotate(-1 60 250)"/>
    <text x="77" y="282" font-size="19" font-weight="700" letter-spacing="1">CONTEXT → CHAPTER → STATE → VERIFY</text>

    <g transform="translate(62 348)">
      <rect width="132" height="58" rx="10" fill="#171717"/>
      <text x="66" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#F4F1E8" letter-spacing="1">AGENTS</text>
      <text x="66" y="46" text-anchor="middle" font-size="23" font-weight="800" fill="#D8FF3E">5</text>

      <rect x="148" width="150" height="58" rx="10" fill="#171717"/>
      <text x="223" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#F4F1E8" letter-spacing="1">COMMANDS</text>
      <text x="223" y="46" text-anchor="middle" font-size="23" font-weight="800" fill="#D8FF3E">27</text>

      <rect x="314" width="170" height="58" rx="10" fill="#171717"/>
      <text x="399" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#F4F1E8" letter-spacing="1">CONSISTENCY</text>
      <text x="399" y="46" text-anchor="middle" font-size="23" font-weight="800" fill="#D8FF3E">13D</text>
    </g>
  </g>

  <g transform="translate(650 82)" font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect width="430" height="304" rx="20" fill="#171717"/>
    <circle cx="25" cy="24" r="5" fill="#FF5B35"/>
    <circle cx="43" cy="24" r="5" fill="#D8FF3E"/>
    <circle cx="61" cy="24" r="5" fill="#3157FF"/>
    <text x="86" y="29" fill="#8C8B86" font-size="11" letter-spacing="1">storyweaver / chapter loop</text>

    <g transform="translate(28 70)">
      <rect width="75" height="44" rx="8" fill="#3157FF"/>
      <text x="37.5" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="700">P0—P3</text>
      <path d="M103 22H133" stroke="#F4F1E8" stroke-width="2"/>
      <path d="M126 15L134 22L126 29" fill="none" stroke="#F4F1E8" stroke-width="2"/>

      <rect x="136" width="94" height="44" rx="8" fill="#F4F1E8"/>
      <text x="183" y="27" text-anchor="middle" fill="#171717" font-size="14" font-weight="700">BRIEF</text>
      <path d="M230 22H260" stroke="#F4F1E8" stroke-width="2"/>
      <path d="M253 15L261 22L253 29" fill="none" stroke="#F4F1E8" stroke-width="2"/>

      <rect x="264" width="110" height="44" rx="8" fill="#FF5B35"/>
      <text x="319" y="27" text-anchor="middle" fill="white" font-size="14" font-weight="700">CHAPTER</text>
    </g>

    <g transform="translate(28 144)">
      <text x="0" y="15" fill="#8C8B86" font-size="11" letter-spacing="1">QUALITY GATE</text>
      <rect y="31" width="374" height="2" fill="#343434"/>
      <rect y="31" width="314" height="2" fill="#D8FF3E"/>

      <text x="0" y="70" fill="#F4F1E8" font-size="13">✓ state extraction</text>
      <text x="190" y="70" fill="#F4F1E8" font-size="13">✓ plot continuity</text>
      <text x="0" y="102" fill="#F4F1E8" font-size="13">✓ canon compliance</text>
      <text x="190" y="102" fill="#F4F1E8" font-size="13">✓ revision history</text>

      <rect y="132" width="374" height="48" rx="9" fill="#242424" stroke="#454545"/>
      <circle cx="24" cy="156" r="7" fill="#14A45A"/>
      <text x="43" y="161" fill="#F4F1E8" font-size="13" font-weight="700">CHAPTER READY FOR NEXT LOOP</text>
    </g>
  </g>
</svg>
