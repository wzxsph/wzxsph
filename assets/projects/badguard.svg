<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BadGuard 散户看盘小纸条预览</title>
  <desc id="desc">A native paper-and-ink product cover for BadGuard, showing a mobile retail-investor signal note interface with four humorous boards and professional annotations.</desc>
  <defs>
    <pattern id="fiber" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 5H18M7 0V18" stroke="#2D2317" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <linearGradient id="paper" x1="72" y1="44" x2="1120" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9EA"/>
      <stop offset="0.58" stop-color="#F5E8C8"/>
      <stop offset="1" stop-color="#E8EDF4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3C2B14" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="#F3EDDD"/>
  <rect width="1200" height="760" fill="url(#fiber)" opacity="0.7"/>
  <rect x="64" y="54" width="1072" height="652" rx="8" fill="url(#paper)" stroke="#6F5B3F" stroke-opacity="0.25" filter="url(#softShadow)"/>
  <path d="M112 265C250 232 374 238 520 205C604 186 666 166 742 170" stroke="#24201A" stroke-opacity="0.18" stroke-width="18" stroke-linecap="round"/>
  <path d="M112 278C240 252 382 256 530 226C628 206 693 194 760 196" stroke="#24201A" stroke-opacity="0.12" stroke-width="7" stroke-linecap="round"/>

  <text x="112" y="125" fill="#A44735" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="900">BadGuard · 收盘后小纸条</text>
  <text x="112" y="190" fill="#24201A" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="64" font-weight="900">散户看盘小纸条</text>
  <text x="112" y="244" fill="#4F473C" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="27" font-weight="700">今天又来抄底啦？先把纸条摊开看看。</text>

  <g transform="translate(112 320)">
    <rect width="520" height="170" rx="8" fill="#FFFAF0" fill-opacity="0.76" stroke="#6F5B3F" stroke-opacity="0.24"/>
    <text x="26" y="42" fill="#A44735" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">专业注解 · 冷静区</text>
    <text x="26" y="78" fill="#24201A" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="28" font-weight="900">标题可以嘴贫，指标不能乱来</text>
    <text x="26" y="116" fill="#4F473C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">KDJ / MACD / RSI / BOLL / 均线 / 量能</text>
    <text x="26" y="148" fill="#36537A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800">只做学习观察，不构成投资建议</text>
  </g>

  <g transform="translate(112 535)">
    <rect width="164" height="54" rx="6" fill="#E6F1EA" stroke="#2F6F5F" stroke-opacity="0.38"/>
