      <text x="16" y="55" fill="#736A5D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="800">数据范围</text>
      <text x="92" y="55" fill="#24201A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="900">活跃A股池</text>
