    </g>

    <g transform="translate(38 352)">
      <rect width="254" height="62" rx="7" fill="#FFFAF0" stroke="#6F5B3F" stroke-opacity="0.28"/>
      <rect x="16" y="16" width="48" height="26" rx="5" fill="#FFFAF0" stroke="#2F6F5F" stroke-opacity="0.72"/>
      <text x="25" y="34" fill="#2F6F5F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="900">观察</text>
      <text x="78" y="28" fill="#24201A" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="18" font-weight="900">勇敢散户向前冲</text>
      <rect x="78" y="43" width="136" height="7" rx="3.5" fill="#D8C8A6"/>
      <rect x="78" y="43" width="116" height="7" rx="3.5" fill="#2F6F5F"/>
    </g>

    <g transform="translate(38 428)">
      <rect width="254" height="62" rx="7" fill="#FFFAF0" stroke="#6F5B3F" stroke-opacity="0.28"/>
      <rect x="16" y="16" width="48" height="26" rx="5" fill="#FFFAF0" stroke="#2F6F5F" stroke-opacity="0.72"/>
      <text x="25" y="34" fill="#2F6F5F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="900">观察</text>
      <text x="78" y="28" fill="#24201A" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="18" font-weight="900">跌麻了，先看修复</text>
      <rect x="78" y="43" width="136" height="7" rx="3.5" fill="#D8C8A6"/>
      <rect x="78" y="43" width="92" height="7" rx="3.5" fill="#2F6F5F"/>
    </g>

    <g transform="translate(38 504)">
      <rect width="254" height="58" rx="7" fill="#FFF1EA" stroke="#A44735" stroke-opacity="0.34"/>
      <rect x="16" y="15" width="48" height="26" rx="5" fill="#FFFAF0" stroke="#A44735" stroke-opacity="0.75"/>
